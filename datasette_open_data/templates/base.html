{% extends "default:base.html" %}

{% block extra_head %}
  {{ super() }}
  <link rel="stylesheet" href="/static/custom.css">
  <style>
    .metadata,
    .sql-write {
    max-width: 1080px;
    margin-left: auto;
    margin-right: auto;
    }
  </style>
{% endblock %}

{% block header %}
  <header style="max-width: 1080px; margin: 40px auto 24px; border-bottom: 1px dashed var(--border-color); padding-bottom: 20px;">
    <h1 style="font-size: 1.5rem; font-weight: 700; margin: 0;">
      <a href="/-/open-data">Open Data Explorer</a>
    </h1>
    <p style="font-family: ui-monospace, monospace; font-size: 0.85rem; margin: 5px 0 0 0; color: #555;">
      Catalog // Load // Query // Analyze
    </p>
  </header>
{% endblock %}
